<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Сканер Е-добавок</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
:root {
  --bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2e;--card:#1e1e30;
  --border:rgba(255,255,255,0.08);--accent:#e94560;
  --green:#4ade80;--yellow:#fbbf24;--red:#f87171;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:500px;margin:0 auto;padding-bottom:40px}
.header{padding:18px 20px 14px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.header h1{font-size:1.25em;font-weight:700}
.header h1 span{color:var(--accent)}
.tabs{display:flex;margin-top:12px;background:var(--bg3);border-radius:10px;padding:3px}
.tab-btn{flex:1;padding:8px;font-size:0.82em;font-weight:600;border:none;background:transparent;color:var(--text2);border-radius:8px;cursor:pointer}
.tab-btn.active{background:var(--accent);color:#fff}
.tab-content{display:none;padding:18px 20px}
.tab-content.active{display:block}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
#vcont{position:relative;width:100%;aspect-ratio:4/3;background:#000;display:none}
#vcont.on{display:block}
#vid{width:100%;height:100%;object-fit:cover;display:block}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:2}
.frame{width:220px;height:130px;border:2px solid var(--accent);border-radius:10px;position:relative;box-shadow:0 0 0 2000px rgba(0,0,0,.5)}
.hint{position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:.75em;color:rgba(255,255,255,.8);background:rgba(0,0,0,.6);padding:6px;z-index:3}
.stop-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 10px;font-size:.75em;cursor:pointer;z-index:5}
.ctrl{padding:14px;display:flex;flex-direction:column;gap:10px}
input,textarea{width:100%;padding:12px;font-size:.92em;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);outline:none}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{height:78px;resize:vertical}
.lbl{font-size:.75em;color:var(--text2);text-transform:uppercase;font-weight:600;margin-bottom:7px}
.btn{width:100%;padding:13px;font-size:.92em;font-weight:600;border:none;border-radius:8px;cursor:pointer;margin-bottom:10px}
.btn-red{background:var(--accent);color:#fff}
.btn-out{background:transparent;color:var(--text);border:1px solid var(--border)}
.divider{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:.75em;text-transform:uppercase;margin:15px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
#status{padding:8px 20px 0;font-size:.82em;color:var(--text2);min-height:26px;text-align:center}
#result{padding:0 20px}
.ph{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:15px;margin-bottom:12px}
.pn{font-size:.98em;font-weight:600;margin-bottom:5px}
.pm{font-size:.78em;color:var(--text2)}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.75em;font-weight:700}
.bc{background:rgba(74,222,128,.15);color:var(--green)}
.bw{background:rgba(251,191,36,.15);color:var(--yellow)}
.bd{background:rgba(248,113,113,.15);color:var(--red)}
.sec{font-size:.72em;text-transform:uppercase;color:var(--text3);font-weight:600;margin:14px 0 7px}
.ai{background:var(--card);border-radius:8px;padding:11px 13px;margin-bottom:7px;border-left:3px solid var(--gray);position:relative}
.ai.safe{border-left-color:var(--green)}.ai.warning{border-left-color:var(--yellow)}.ai.danger{border-left-color:var(--red)}
.ac{font-size:.88em;font-weight:700}.an{font-size:.84em;font-weight:600}.ad{font-size:.76em;color:var(--text2);margin-top:3px}
.si{position:absolute;right:11px;top:11px;font-size:.95em}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.li{display:flex;align-items:center;gap:4px;font-size:.72em;color:var(--text2)}
.ld{width:8px;height:8px;border-radius:50%}
.clean{text-align:center;padding:28px;background:var(--card);border-radius:14px;border:1px solid var(--border)}
.ci{font-size:2.2em}.ct{font-size:.95em;font-weight:700;color:var(--green)}.cs{font-size:.8em;color:var(--text2)}
.info{font-size:.75em;color:var(--text3);text-align:center;margin-top:8px}
a{color:var(--accent)}
.iphone-note{background:#2a1a1a;border:1px solid var(--accent);border-radius:8px;padding:10px;text-align:center;font-size:.78em;color:var(--text2);margin-bottom:10px}
</style>
</head>
<body>
<div class="header">
  <h1>🔬 Сканер <span>Е-добавок</span></h1>
  <div class="tabs">
    <button class="tab-btn active" onclick="sw('scan')">📷 Штрихкод</button>
    <button class="tab-btn" onclick="sw('manual')">✍️ Вручную</button>
  </div>
</div>

<div id="tab-scan" class="tab-content active">
  <div class="card">
    <div id="vcont">
      <video id="vid" autoplay playsinline muted></video>
      <div class="overlay"><div class="frame"></div></div>
      <div class="hint">Наведите на штрихкод</div>
      <button class="stop-btn" onclick="stopCam()">✕ Стоп</button>
    </div>
    <div class="ctrl">
      <button id="cbtn" class="btn btn-red" onclick="startCam()">📷 Сканировать камерой</button>
      <div class="divider">или</div>
      <input type="text" id="bi" placeholder="Введите штрихкод вручную" inputmode="numeric">
      <button class="btn btn-out" onclick="goBarcode()">🔍 Найти по коду</button>
      <p class="info" id="hint-text"></p>
    </div>
  </div>
</div>

<div id="tab-manual" class="tab-content">
  <div class="card" style="padding:15px">
    <div class="lbl">Введите Е-добавки через запятую</div>
    <textarea id="mi" placeholder="Например: E102, E211, E621, E330"></textarea>
  </div>
  <button class="btn btn-red" onclick="goManual()">🔬 Расшифровать</button>
</div>

<p id="status"></p>
<div id="result"></div>

<script>
var DB={
"E100":["Куркумин","Натуральный краситель","safe"],"E102":["Тартразин","Краситель. Аллергия","danger"],
"E110":["Солнечный закат","Краситель. Аллерген","danger"],"E120":["Кармин","Натуральный краситель","warning"],
"E122":["Азорубин","Краситель. Аллерген","danger"],"E124":["Понсо 4R","Краситель. Запрещён в США","danger"],
"E129":["Красный очаровательный","Краситель. Аллергия","warning"],"E133":["Бриллиантовый голубой","Осторожно при астме","warning"],
"E150a":["Сахарный колер I","Карамель. Безопасна","safe"],"E150d":["Сахарный колер IV","Возможный канцероген","warning"],
"E153":["Уголь растительный","Безопасен","safe"],"E160a":["Бета-каротин","Провитамин A","safe"],
"E162":["Свекольный красный","Натуральный краситель","safe"],"E170":["Карбонат кальция","Мел. Безопасен","safe"],
"E171":["Диоксид титана","Запрещён в ЕС с 2022","danger"],"E200":["Сорбиновая кислота","Консервант. Безопасен","safe"],
"E202":["Сорбат калия","Консервант. Безопасен","safe"],"E211":["Бензоат натрия","С витамином C даёт бензол","warning"],
"E220":["Диоксид серы","Астматикам нельзя","danger"],"E250":["Нитрит натрия","Токсичен, канцероген","danger"],
"E260":["Уксусная кислота","Безопасна","safe"],"E270":["Молочная кислота","Безопасна","safe"],
"E300":["Аскорбиновая кислота","Витамин C","safe"],"E306":["Токоферол","Витамин E","safe"],
"E319":["ТБГХ","Ограничен в ЕС","warning"],"E320":["БОА","Возможный канцероген","danger"],
"E321":["БОТ","Запрещён в Японии","danger"],"E322":["Лецитины","Эмульгатор. Безопасен","safe"],
"E330":["Лимонная кислота","Безопасна","safe"],"E338":["Ортофосфорная кислота","Вымывает кальций","warning"],
"E400":["Альгиновая кислота","Из водорослей. Безопасен","safe"],"E406":["Агар-агар","Безопасен","safe"],
"E407":["Каррагинан","Может вызывать воспаления","warning"],"E412":["Гуаровая камедь","Безопасна","safe"],
"E415":["Ксантановая камедь","Безопасна","safe"],"E420":["Сорбит","Слабит в больших дозах","safe"],
"E422":["Глицерин","Безопасен","safe"],"E440":["Пектин","Из фруктов. Полезен","safe"],
"E450":["Пирофосфаты","Нарушает баланс кальция","warning"],"E451":["Трифосфаты","Осторожно при болезнях почек","warning"],
"E452":["Полифосфаты","Нагрузка на почки","danger"],"E460":["Целлюлоза","Клетчатка. Безопасна","safe"],
"E466":["Карбоксиметилцеллюлоза","Безопасна","safe"],"E471":["Моно- и диглицериды","Эмульгатор. Безопасен","safe"],
"E476":["Полиглицерин","Часто из ГМО-сои","warning"],"E500":["Карбонаты натрия","Сода. Безопасен","safe"],
"E509":["Хлорид кальция","Безопасен","safe"],"E551":["Диоксид кремния","Безопасен","safe"],
"E621":["Глутамат натрия","Головные боли у чувствительных","warning"],"E631":["Инозинат натрия","Осторожно","warning"],
"E901":["Пчелиный воск","Безопасен","safe"],"E904":["Шеллак","Безопасен","safe"],
"E950":["Ацесульфам калия","Спорно","warning"],"E951":["Аспартам","Запрещён при фенилкетонурии","warning"],
"E952":["Цикламат","Запрещён в США","danger"],"E955":["Сукралоза","Безопасна","safe"],
"E960":["Стевия","Натуральный. Безопасен","safe"],"E967":["Ксилит","Полезен для зубов","safe"],
"E968":["Эритрит","0 калорий","safe"],"E1422":["Ацетилированный крахмал","Безопасен","safe"]
};

var stream=null,detector=null,scanActive=false;
var hasNative = ('BarcodeDetector' in window);

// Показываем подсказку
document.getElementById('hint-text').textContent = hasNative ? 
  '⚡ Ваше устройство поддерживает быстрое сканирование' : 
  '📱 На iPhone сканер камеры недоступен. Введите штрихкод вручную или скопируйте цифры с упаковки.';

function sw(t){
  document.querySelectorAll('.tab-content').forEach(function(e){e.classList.remove('active')});
  document.querySelectorAll('.tab-btn').forEach(function(e){e.classList.remove('active')});
  document.getElementById('tab-'+t).classList.add('active');
  document.querySelectorAll('.tab-btn')[t==='scan'?0:1].classList.add('active');
}
function st(m){document.getElementById('status').textContent=m}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function stopCam(){
  scanActive=false;
  if(stream){stream.getTracks().forEach(function(t){t.stop()});stream=null}
  document.getElementById('vcont').classList.remove('on');
  document.getElementById('cbtn').textContent='📷 Сканировать камерой';
  document.getElementById('cbtn').disabled=false;
}

function startCam(){
  if(!hasNative){
    st('Сканер камеры не поддерживается на этом устройстве');
    return;
  }
  document.getElementById('result').innerHTML='';
  document.getElementById('cbtn').disabled=true;
  document.getElementById('cbtn').textContent='⏳ Запуск...';
  st('Запрашиваю камеру...');
  
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:1280,height:720}})
    .then(function(s){
      stream=s;
      var v=document.getElementById('vid');
      v.srcObject=s;
      document.getElementById('vcont').classList.add('on');
      document.getElementById('cbtn').textContent='🔄 Перезапустить';
      document.getElementById('cbtn').disabled=false;
      v.onloadedmetadata=function(){
        v.play();
        st('Наведите камеру на штрихкод');
        detector=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','code_128','code_39']});
        scanActive=true;
        scanLoop(v);
      };
    })
    .catch(function(e){
      stopCam();
      st('Нет доступа к камере. Разрешите в настройках браузера.');
    });
}

function scanLoop(v){
  if(!scanActive||!stream)return;
  detector.detect(v).then(function(r){
    if(r.length>0){
      var code=r[0].rawValue;
      stopCam();
      st('Найден: '+code);
      fetchProduct(code);
    }else{
      requestAnimationFrame(function(){scanLoop(v)});
    }
  }).catch(function(){
    requestAnimationFrame(function(){scanLoop(v)});
  });
}

function goBarcode(){
  var code=document.getElementById('bi').value.trim().replace(/\D/g,'');
  if(code.length<8){st('Введите от 8 цифр');return}
  document.getElementById('result').innerHTML='';
  st('Ищем...');
  fetchProduct(code);
}

function fetchProduct(code){
  fetch('https://world.openfoodfacts.org/api/v0/product/'+code+'.json?fields=product_name,product_name_ru,brands,additives_tags')
    .then(function(r){return r.json()})
    .then(function(d){
      if(d.status===1){
        st('');
        var p=d.product;
        var name=p.product_name_ru||p.product_name||'Без названия';
        var brand=p.brands||'';
        var tags=p.additives_tags||[];
        var codes=tags.map(function(t){return t.replace(/^[a-z]{2}:/i,'').toUpperCase()});
        renderAdditives(name,brand,codes);
      }else{
        st('Не найдено');
        document.getElementById('result').innerHTML='<div style="text-align:center;padding:20px;color:var(--text2)">😔 Товар не найден.<br><br><a href="https://world.openfoodfacts.org/product/'+code+'/add" target="_blank">➕ Добавить в базу</a></div>';
      }
    })
    .catch(function(){st('Ошибка соединения')});
}

function goManual(){
  var raw=document.getElementById('mi').value.trim().toUpperCase();
  if(!raw){st('Введите Е-добавки');return}
  var codes=raw.split(/[\s,;]+/).filter(Boolean).map(function(c){c=c.trim();return c[0]==='E'?c:'E'+c});
  st('');
  document.getElementById('result').innerHTML='';
  renderAdditives(null,null,codes);
}

function renderAdditives(name,brand,codes){
  var html='';
  if(name){
    html+='<div class="ph"><div class="pn">📦 '+esc(name)+'</div>';
    if(brand)html+='<div class="pm">'+esc(brand)+'</div>';
    var nd=codes.filter(function(c){return DB[c]&&DB[c][2]==='danger'}).length;
    var nw=codes.filter(function(c){return DB[c]&&DB[c][2]==='warning'}).length;
    var ns=codes.filter(function(c){return DB[c]&&DB[c][2]==='safe'}).length;
    html+='<div class="badges">';
    if(codes.length===0)html+='<span class="badge bc">✓ Без Е-добавок</span>';
    else{
      if(nd)html+='<span class="badge bd">⚠ опасных: '+nd+'</span>';
      if(nw)html+='<span class="badge bw">! спорных: '+nw+'</span>';
      if(ns)html+='<span class="badge bc">✓ безопасных: '+ns+'</span>';
    }
    html+='</div></div>';
  }
  if(codes.length===0){
    html+='<div class="clean"><div class="ci">🌿</div><div class="ct">Продукт чистый!</div><div class="cs">Е-добавки не обнаружены</div></div>';
    document.getElementById('result').innerHTML=html;return;
  }
  html+='<div class="legend"><span class="li"><span class="ld" style="background:var(--red)"></span>Опасно</span><span class="li"><span class="ld" style="background:var(--yellow)"></span>Спорно</span><span class="li"><span class="ld" style="background:var(--green)"></span>Безопасно</span></div>';
  codes.forEach(function(c){
    var i=DB[c];
    var cls=i?i[2]:'unknown';
    var icon=cls==='danger'?'🔴':cls==='warning'?'🟡':cls==='safe'?'🟢':'⚪';
    html+='<div class="ai '+cls+'"><span class="si">'+icon+'</span><div class="ac">'+c+(i?' — <span class="an">'+esc(i[0])+'</span>':'')+'</div>'+(i?'<div class="ad">'+esc(i[1])+'</div>':'<div class="ad">Нет данных</div>')+'</div>';
  });
  document.getElementById('result').innerHTML=html;
}
</script>
</body>
</html>
