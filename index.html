<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер Е-добавок</title>
    <link rel="manifest" href="e-manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        h1 { font-size: 1.5em; margin-bottom: 5px; }
        h2 { font-size: 1.1em; color: #aaa; margin-bottom: 15px; }
        button {
            display: block;
            width: 280px;
            padding: 15px;
            font-size: 1.1em;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px auto;
        }
        button:active { background: #c73652; }
        .btn-green { background: #4CAF50; }
        .btn-green:active { background: #388E3C; }
        input, textarea {
            width: 250px;
            padding: 12px;
            font-size: 1em;
            border-radius: 10px;
            border: 2px solid #e94560;
            text-align: center;
            margin: 8px;
            background: #16213e;
            color: white;
            font-family: Arial, sans-serif;
        }
        textarea {
            height: 60px;
            text-align: left;
        }
        #result {
            margin: 10px;
            font-size: 1.1em;
            text-align: left;
            max-width: 400px;
            margin: 10px auto;
        }
        .additive {
            padding: 8px;
            margin: 5px 0;
            border-radius: 8px;
            background: #16213e;
        }
        .safe { border-left: 5px solid #4CAF50; }
        .warning { border-left: 5px solid #FF9800; }
        .danger { border-left: 5px solid #e94560; }
        .unknown { border-left: 5px solid #666; }
        #loading { color: #aaa; font-size: 0.9em; margin: 10px; }
        hr { border-color: #333; margin: 20px 0; }
        .tab { display: inline-block; padding: 10px 20px; cursor: pointer; color: #aaa; }
        .tab.active { color: #e94560; border-bottom: 2px solid #e94560; }
    </style>
</head>

    <!-- Вкладки -->
    <div>
        <span class="tab active" onclick="showTab('scan')">📷 Штрихкод</span>

    </div>

        function showTab(tab) {
            document.getElementById("tab-scan").style.display = (tab === 'scan') ? 'block' : 'none';
            document.getElementById("tab-manual").style.display = (tab === 'manual') ? 'block' : 'none';
            var tabs = document.querySelectorAll('.tab');
            tabs[0].className = (tab === 'scan') ? 'tab active' : 'tab';
            tabs[1].className = (tab === 'manual') ? 'tab active' : 'tab';
            document.getElementById("loading").textContent = "";
        }

        function startScan() {
            document.getElementById("loading").textContent = "Запуск сканера...";
            document.getElementById("result").innerHTML = "";
            
            if ('BarcodeDetector' in window) {
                scanWithBarcodeDetector();
            } else {
                document.getElementById("loading").textContent = "Сканер не поддерживается вашим браузером. Введите штрихкод вручную.";
            }
        }

        function scanWithBarcodeDetector() {
            var video = document.createElement("video");
            var canvas = document.createElement("canvas");
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(function(stream) {
                    video.srcObject = stream;
                    video.play();
                    document.getElementById("loading").textContent = "Наведите на штрихкод...";
                    
                    var barcodeDetector = new BarcodeDetector({ formats: ["ean_13", "ean_8"] });
                    
                    function detectLoop() {
                        if (video.readyState === video.HAVE_ENOUGH_DATA) {
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
                            
                            barcodeDetector.detect(canvas)
                                .then(function(barcodes) {
                                    if (barcodes.length > 0) {
                                        stream.getTracks().forEach(track => track.stop());
                                        document.getElementById("loading").textContent = "Найден!";
                                        fetchProductInfo(barcodes[0].rawValue);
                                        return;
                                    }
                                    requestAnimationFrame(detectLoop);
                                })
                                .catch(function() {
                                    requestAnimationFrame(detectLoop);
                                });
                        } else {
                            requestAnimationFrame(detectLoop);
                        }
                    }
                    
                    detectLoop();
                })
                .catch(function() {
                    document.getElementById("loading").textContent = "Нет доступа к камере. Проверьте разрешения браузера.";
                });
        }

        function searchManual() {
            var code = document.getElementById("barcodeInput").value.trim();
            if (code.length < 8) {
                document.getElementById("loading").textContent = "Введите корректный штрихкод (8-13 цифр)";
                return;
            }
            document.getElementById("loading").textContent = "Ищем...";
            document.getElementById("result").innerHTML = "";
            fetchProductInfo(code);
        }

        function fetchProductInfo(barcode) {
            document.getElementById("loading").textContent = "Ищем продукт в базе Open Food Facts...";
            
            fetch("https://world.openfoodfacts.org/api/v0/product/" + barcode + ".json")
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.status === 1) {
                        showAdditives(data.product);
                    } else {
                        document.getElementById("loading").textContent = "Продукт не найден в базе.";
                        document.getElementById("result").innerHTML = "<p style='color:#aaa;'>😔 Этого товара пока нет в базе Open Food Facts.</p><p style='color:#aaa;'>Перейдите на вкладку <b>✍️ Вручную</b> и введите Е-добавки с упаковки.</p>";
                    }
                })
                .catch(function() {
                    document.getElementById("loading").textContent = "Ошибка соединения. Проверьте интернет.";
                });
        }

        function analyzeManual() {
            var input = document.getElementById("manualInput").value.toUpperCase().trim();
            if (!input) {
                document.getElementById("loading").textContent = "Введите Е-добавки через запятую";
                return;
            }
            
            var codes = input.split(/[,; ]+/).filter(function(c) { return c.length > 0; });
            document.getElementById("result").innerHTML = "";
            document.getElementById("loading").textContent = "Найдено Е-добавок: " + codes.length;
            
            var html = "";
            for (var i = 0; i < codes.length; i++) {
                var code = codes[i].trim();
                if (!code.startsWith("E")) {
                    code = "E" + code;
                }
                var info = e_db[code];
                
                if (info) {
                    var cssClass = info[2];
                    html += '<div class="additive ' + cssClass + '">';
                    html += '<b>' + code + '</b> — ' + info[0] + '<br>';
                    html += '<small>' + info[1] + '</small>';
                    html += '</div>';
                } else {
                    html += '<div class="additive unknown">';
                    html += '<b>' + code + '</b> — Информация уточняется';
                    html += '</div>';
                }
            }
            document.getElementById("result").innerHTML = html;
        }

        function showAdditives(product) {
            var name = product.product_name || "Название не указано";
            var additives = product.additives_tags || [];
            
            var html = "<h3>📦 " + name + "</h3>";
            
            if (additives.length === 0) {
                html += "<p style='color:#4CAF50;'>✅ Е-добавки не найдены! Продукт чистый.</p>";
            } else {
                html += "<p>Найдено Е-добавок: <b>" + additives.length + "</b></p>";
                
                for (var i = 0; i < additives.length; i++) {
                    var code = additives[i].replace("en:", "").toUpperCase();
                    var info = e_db[code];
                    
                    if (info) {
                        var cssClass = info[2];
                        html += '<div class="additive ' + cssClass + '">';
                        html += '<b>' + code + '</b> — ' + info[0] + '<br>';
                        html += '<small>' + info[1] + '</small>';
                        html += '</div>';
                    } else {
                        html += '<div class="additive unknown">';
                        html += '<b>' + code + '</b> — Информация уточняется';
                        html += '</div>';
                    }
                }
            }

            document.getElementById("result").innerHTML = html;
            document.getElementById("loading").textContent = "Готово!";
        }
