<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Сканер Е-добавок</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root {
    --bg: #0d0d14;
    --bg2: #13131f;
    --bg3: #1a1a2e;
    --card: #1e1e30;
    --border: rgba(255,255,255,0.08);
    --accent: #e94560;
    --accent2: #ff6b6b;
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --gray: #6b7280;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #475569;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 500px;
    margin: 0 auto;
    padding: 0 0 40px;
  }
  .header {
    padding: 20px 20px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header h1 {
    font-size: 1.3em;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header h1 span { color: var(--accent); }
  .tabs {
    display: flex;
    gap: 0;
    margin-top: 14px;
    background: var(--bg3);
    border-radius: 10px;
    padding: 3px;
  }
  .tab-btn {
    flex: 1;
    padding: 8px;
    font-size: 0.82em;
    font-weight: 600;
    border: none;
    background: transparent;
    color: var(--text2);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }
  .tab-btn.active {
    background: var(--accent);
    color: white;
  }
  .tab-content { display: none; padding: 20px; }
  .tab-content.active { display: block; }

  /* SCAN TAB */
  .scan-area {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 16px;
  }
  #video-container {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    display: none;
    overflow: hidden;
  }
  #video-container.active { display: block; }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .scan-frame {
    width: 220px;
    height: 140px;
    border: 2px solid var(--accent);
    border-radius: 12px;
    position: relative;
    box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);
  }
  .scan-line {
    position: absolute;
    left: 10px;
    right: 10px;
    height: 2px;
    background: var(--accent);
    top: 50%;
    animation: scanMove 2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent);
  }
  @keyframes scanMove {
    0%, 100% { top: 20%; }
    50% { top: 80%; }
  }
  .scan-hint {
    position: absolute;
    bottom: 12px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.78em;
    color: rgba(255,255,255,0.8);
    background: rgba(0,0,0,0.5);
    padding: 6px;
  }
  .scan-controls {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .btn-primary {
    width: 100%;
    padding: 14px;
    font-size: 0.95em;
    font-weight: 600;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-primary:active { opacity: 0.8; }
  .btn-primary:disabled { opacity: 0.5; cursor: default; }
  .btn-secondary {
    width: 100%;
    padding: 13px;
    font-size: 0.9em;
    font-weight: 600;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-secondary:active { background: rgba(255,255,255,0.05); }
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text3);
    font-size: 0.78em;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .input-field {
    width: 100%;
    padding: 13px 14px;
    font-size: 0.95em;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-field:focus { border-color: var(--accent); }
  .input-field::placeholder { color: var(--text3); }

  /* MANUAL TAB */
  .manual-area {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 16px;
  }
  .label {
    font-size: 0.78em;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  textarea.input-field {
    height: 80px;
    resize: vertical;
    font-family: inherit;
    line-height: 1.5;
  }

  /* RESULTS */
  #result { padding: 0 20px; }
  .product-header {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 14px;
  }
  .product-name {
    font-size: 1em;
    font-weight: 600;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .product-meta {
    font-size: 0.8em;
    color: var(--text2);
  }
  .additive-count {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 0.82em;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.78em;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .badge-clean { background: rgba(74,222,128,0.15); color: var(--green); }
  .badge-warn { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .badge-danger { background: rgba(248,113,113,0.15); color: var(--red); }

  .additive-item {
    background: var(--card);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
    border-left: 3px solid var(--gray);
    position: relative;
  }
  .additive-item.safe { border-left-color: var(--green); }
  .additive-item.warning { border-left-color: var(--yellow); }
  .additive-item.danger { border-left-color: var(--red); }
  .additive-item.unknown { border-left-color: var(--text3); }
  .additive-code {
    font-size: 0.9em;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .additive-code .code { color: var(--text2); }
  .additive-name { font-size: 0.85em; font-weight: 600; }
  .additive-desc { font-size: 0.78em; color: var(--text2); margin-top: 3px; line-height: 1.4; }
  .status-icon {
    position: absolute;
    right: 12px;
    top: 12px;
    font-size: 1em;
  }
  .section-title {
    font-size: 0.75em;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    font-weight: 600;
    margin: 16px 0 8px;
  }
  .clean-msg {
    text-align: center;
    padding: 30px 20px;
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .clean-icon { font-size: 2.5em; margin-bottom: 10px; }
  .clean-title { font-size: 1em; font-weight: 700; color: var(--green); }
  .clean-sub { font-size: 0.82em; color: var(--text2); margin-top: 5px; }

  #status-msg {
    padding: 10px 20px 0;
    font-size: 0.82em;
    color: var(--text2);
    min-height: 28px;
    text-align: center;
  }
  .loading-dots::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0%, 20% { content: '.'; }
    40% { content: '..'; }
    60%, 100% { content: '...'; }
  }

  /* Stop camera btn */
  .stop-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.7);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 0.75em;
    cursor: pointer;
    z-index: 5;
  }

  .legend {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
    font-size: 0.72em;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--text2);
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-green { background: var(--green); }
  .dot-yellow { background: var(--yellow); }
  .dot-red { background: var(--red); }
  .dot-gray { background: var(--text3); }
</style>
</head>
<body>

<div class="header">
  <h1>🔬 Сканер <span>Е-добавок</span></h1>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('scan')">📷 Штрихкод</button>
    <button class="tab-btn" onclick="switchTab('manual')">✍️ Вручную</button>
  </div>
</div>

<div id="tab-scan" class="tab-content active">
  <div class="scan-area">
    <div id="video-container">
      <video id="video" autoplay playsinline muted></video>
      <div class="scan-overlay">
        <div class="scan-frame">
          <div class="scan-line"></div>
        </div>
      </div>
      <div class="scan-hint">Поместите штрихкод в рамку</div>
      <button class="stop-btn" onclick="stopCamera()">✕ Стоп</button>
    </div>
    <div class="scan-controls">
      <button id="cam-btn" class="btn-primary" onclick="startCamera()">📷 Включить камеру</button>
      <div class="divider">или</div>
      <input type="text" class="input-field" id="barcode-input" placeholder="Введите штрихкод (8-13 цифр)" inputmode="numeric" onkeydown="if(event.key==='Enter')searchByBarcode()">
      <button class="btn-secondary" onclick="searchByBarcode()">🔍 Найти продукт</button>
    </div>
  </div>
</div>

<div id="tab-manual" class="tab-content">
  <div class="manual-area">
    <div class="label">Введите Е-добавки</div>
    <textarea class="input-field" id="manual-input" placeholder="Например: E102, E211, E621, E330"></textarea>
  </div>
  <button class="btn-primary" onclick="analyzeManual()">🔬 Расшифровать добавки</button>
</div>

<p id="status-msg"></p>
<div id="result"></div>

var cameraStream = null;
var scanInterval = null;
var codeReader = null;

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.tab-btn')[tab === 'scan' ? 0 : 1].classList.add('active');
  setStatus('');
}

function setStatus(msg, loading) {
  var el = document.getElementById('status-msg');
  el.textContent = msg;
  if (loading) el.classList.add('loading-dots');
  else el.classList.remove('loading-dots');
}

function stopCamera() {
  if (codeReader) {
    codeReader.reset();
    codeReader = null;
  }
  if (cameraStream) {
    cameraStream.getTracks().forEach(function(t) { t.stop(); });
    cameraStream = null;
  }
  document.getElementById('video-container').classList.remove('active');
  document.getElementById('cam-btn').textContent = '📷 Включить камеру';
  document.getElementById('cam-btn').disabled = false;
}

function startCamera() {
  document.getElementById('result').innerHTML = '';
  setStatus('Запуск камеры', true);
  document.getElementById('cam-btn').disabled = true;
  document.getElementById('cam-btn').textContent = '⏳ Загрузка...';

  if (typeof ZXingBrowser === 'undefined') {
    setStatus('Загружаю сканер...');
    setTimeout(startCamera, 1000);
    return;
  }

  document.getElementById('video-container').classList.add('active');

  codeReader = new ZXingBrowser.BrowserMultiFormatReader();

  navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } })
    .then(function(stream) {
      cameraStream = stream;
      var video = document.getElementById('video');
      video.srcObject = stream;
      setStatus('Наведите камеру на штрихкод', false);
      document.getElementById('cam-btn').textContent = '🔄 Перезапустить';
      document.getElementById('cam-btn').disabled = false;

      codeReader.decodeFromStream(stream, video, function(result, err) {
        if (result) {
          var code = result.getText();
          stopCamera();
          setStatus('Штрихкод: ' + code + ' — ищем продукт', true);
          fetchProduct(code);
        }
      });
    })
    .catch(function(err) {
      stopCamera();
      if (err.name === 'NotAllowedError') {
        setStatus('Нет доступа к камере. Разрешите доступ в настройках браузера');
      } else if (err.name === 'NotFoundError') {
        setStatus('Камера не найдена');
      } else {
        setStatus('Ошибка камеры: ' + err.message);
      }
      document.getElementById('cam-btn').textContent = '📷 Включить камеру';
      document.getElementById('cam-btn').disabled = false;
    });
}

function searchByBarcode() {
  var code = document.getElementById('barcode-input').value.trim().replace(/\s/g, '');
  if (code.length < 8) {
    setStatus('Введите корректный штрихкод (8–13 цифр)');
    return;
  }
  document.getElementById('result').innerHTML = '';
  setStatus('Ищем продукт', true);
  fetchProduct(code);
}

function fetchProduct(barcode) {
  var url = 'https://world.openfoodfacts.org/api/v0/product/' + barcode + '.json?fields=product_name,product_name_ru,brands,additives_tags,additives_original_tags,ingredients_text_ru,ingredients_text';
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === 1) {
        setStatus('');
        renderProduct(data.product);
      } else {
        setStatus('Продукт не найден в базе Open Food Facts');
        document.getElementById('result').innerHTML = '<div style="text-align:center;padding:30px 0;color:var(--text2);font-size:0.9em;">😔 Товар не найден.<br><br>Перейдите на вкладку <b>✍️ Вручную</b><br>и введите Е-добавки с упаковки</div>';
      }
    })
    .catch(function() {
      setStatus('Ошибка соединения. Проверьте интернет');
    });
}

function analyzeManual() {
  var raw = document.getElementById('manual-input').value.trim().toUpperCase();
  if (!raw) { setStatus('Введите Е-добавки'); return; }
  var codes = raw.split(/[\s,;]+/).filter(Boolean).map(function(c) {
    c = c.trim();
    return c.startsWith('E') ? c : 'E' + c;
  });
  setStatus('');
  document.getElementById('result').innerHTML = '';
  renderAdditives(null, null, null, codes);
}

function renderProduct(p) {
  var name = p.product_name_ru || p.product_name || 'Название не указано';
  var brand = p.brands || '';
  var addTags = p.additives_tags || p.additives_original_tags || [];
  var codes = addTags.map(function(t) {
    return t.replace(/^en:/i, '').replace(/^ru:/i, '').toUpperCase();
  });
  renderAdditives(name, brand, null, codes);
}

function renderAdditives(name, brand, img, codes) {
  var html = '';
  if (name) {
    html += '<div class="product-header">';
    html += '<div class="product-name">📦 ' + escHtml(name) + '</div>';
    if (brand) html += '<div class="product-meta">' + escHtml(brand) + '</div>';

    if (codes.length === 0) {
      html += '<div style="margin-top:10px"><span class="badge badge-clean">✓ Без Е-добавок</span></div>';
    } else {
      var danger = codes.filter(function(c) { return eDB[c] && eDB[c][2] === 'danger'; }).length;
      var warn = codes.filter(function(c) { return eDB[c] && eDB[c][2] === 'warning'; }).length;
      var safe = codes.filter(function(c) { return eDB[c] && eDB[c][2] === 'safe'; }).length;
      html += '<div class="additive-count">';
      html += 'Добавок: <b>' + codes.length + '</b>&nbsp;';
      if (danger > 0) html += '<span class="badge badge-danger">⚠ опасных: ' + danger + '</span>&nbsp;';
      if (warn > 0) html += '<span class="badge badge-warn">! спорных: ' + warn + '</span>&nbsp;';
      if (safe > 0) html += '<span class="badge badge-clean">✓ безопасных: ' + safe + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }

  if (codes.length === 0 && !name) {
    setStatus('Нет добавок для анализа');
    document.getElementById('result').innerHTML = html;
    return;
  }

  if (codes.length === 0) {
    html += '<div class="clean-msg"><div class="clean-icon">🌿</div><div class="clean-title">Продукт чистый!</div><div class="clean-sub">Е-добавки не обнаружены</div></div>';
    document.getElementById('result').innerHTML = html;
    return;
  }

  var dangerous = [], warning = [], safe = [], unknown = [];
  codes.forEach(function(code) {
    var info = eDB[code];
    if (!info) unknown.push(code);
    else if (info[2] === 'danger') dangerous.push(code);
    else if (info[2] === 'warning') warning.push(code);
    else safe.push(code);
  });

  function renderGroup(list, cls, icon) {
    return list.map(function(code) {
      var info = eDB[code];
      var s = '<div class="additive-item ' + cls + '">';
      s += '<span class="status-icon">' + icon + '</span>';
      s += '<div class="additive-code"><span class="code">' + code + '</span>';
      if (info) s += ' — <span class="additive-name">' + escHtml(info[0]) + '</span>';
      s += '</div>';
      if (info) s += '<div class="additive-desc">' + escHtml(info[1]) + '</div>';
      else s += '<div class="additive-desc" style="color:var(--text3)">Нет данных в базе</div>';
      s += '</div>';
      return s;
    }).join('');
  }

  html += '<div class="legend"><span class="legend-item"><span class="legend-dot dot-red"></span>Опасно</span><span class="legend-item"><span class="legend-dot dot-yellow"></span>С осторожностью</span><span class="legend-item"><span class="legend-dot dot-green"></span>Безопасно</span><span class="legend-item"><span class="legend-dot dot-gray"></span>Неизвестно</span></div>';

  if (dangerous.length) html += '<div class="section-title">⚠️ Опасные</div>' + renderGroup(dangerous, 'danger', '🔴');
  if (warning.length) html += '<div class="section-title">⚡ Спорные / с осторожностью</div>' + renderGroup(warning, 'warning', '🟡');
  if (safe.length) html += '<div class="section-title">✅ Безопасные</div>' + renderGroup(safe, 'safe', '🟢');
  if (unknown.length) html += '<div class="section-title">❓ Нет данных</div>' + renderGroup(unknown, 'unknown', '⚪');

  document.getElementById('result').innerHTML = html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
