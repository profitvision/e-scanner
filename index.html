<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Сканер Е-добавок</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
:root {
  --bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2e;--card:#1e1e30;
  --border:rgba(255,255,255,0.08);--accent:#e94560;
  --green:#4ade80;--yellow:#fbbf24;--red:#f87171;--gray:#6b7280;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:500px;margin:0 auto;padding-bottom:40px}
.header{padding:18px 20px 14px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.header h1{font-size:1.25em;font-weight:700}
.header h1 span{color:var(--accent)}
.tabs{display:flex;margin-top:12px;background:var(--bg3);border-radius:10px;padding:3px;gap:0}
.tab-btn{flex:1;padding:8px;font-size:0.82em;font-weight:600;border:none;background:transparent;color:var(--text2);border-radius:8px;cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--accent);color:#fff}
.tab-content{display:none;padding:18px 20px}
.tab-content.active{display:block}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
#vcont{position:relative;width:100%;aspect-ratio:4/3;background:#000;display:none}
#vcont.on{display:block}
#vid{width:100%;height:100%;object-fit:cover;display:block}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.frame{width:220px;height:130px;border:2px solid var(--accent);border-radius:10px;position:relative;box-shadow:0 0 0 2000px rgba(0,0,0,.5)}
.line{position:absolute;left:8px;right:8px;height:2px;background:var(--accent);animation:sc 2s ease-in-out infinite;box-shadow:0 0 6px var(--accent)}
@keyframes sc{0%,100%{top:15%}50%{top:80%}}
.hint{position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:.75em;color:rgba(255,255,255,.8);background:rgba(0,0,0,.6);padding:6px}
.stop-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 10px;font-size:.75em;cursor:pointer;z-index:5}
.ctrl{padding:14px;display:flex;flex-direction:column;gap:10px}
.btn{width:100%;padding:13px;font-size:.92em;font-weight:600;border:none;border-radius:var(--rs);cursor:pointer;transition:opacity .15s;letter-spacing:.2px}
.btn:active{opacity:.8}
.btn:disabled{opacity:.4;cursor:default}
.btn-red{background:var(--accent);color:#fff}
.btn-out{background:transparent;color:var(--text);border:1px solid var(--border)}
.divider{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:.75em;text-transform:uppercase;letter-spacing:1px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
input,textarea{width:100%;padding:12px 14px;font-size:.92em;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);outline:none;font-family:inherit;transition:border-color .2s}
input:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text3)}
textarea{height:78px;resize:vertical;line-height:1.5}
.lbl{font-size:.75em;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:7px}
#status{padding:8px 20px 0;font-size:.82em;color:var(--text2);min-height:26px;text-align:center}
#result{padding:0 20px}
.ph{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:15px;margin-bottom:12px}
.pn{font-size:.98em;font-weight:600;margin-bottom:5px;line-height:1.4}
.pm{font-size:.78em;color:var(--text2)}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.75em;font-weight:700}
.bc{background:rgba(74,222,128,.15);color:var(--green)}
.bw{background:rgba(251,191,36,.15);color:var(--yellow)}
.bd{background:rgba(248,113,113,.15);color:var(--red)}
.sec{font-size:.72em;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:600;margin:14px 0 7px}
.ai{background:var(--card);border-radius:var(--rs);padding:11px 13px;margin-bottom:7px;border-left:3px solid var(--gray);position:relative}
.ai.safe{border-left-color:var(--green)}.ai.warning{border-left-color:var(--yellow)}.ai.danger{border-left-color:var(--red)}.ai.unknown{border-left-color:var(--text3)}
.ac{font-size:.88em;font-weight:700;margin-bottom:2px}
.an{font-size:.84em;font-weight:600}
.ad{font-size:.76em;color:var(--text2);margin-top:3px;line-height:1.4}
.si{position:absolute;right:11px;top:11px;font-size:.95em}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.li{display:flex;align-items:center;gap:4px;font-size:.72em;color:var(--text2)}
.ld{width:8px;height:8px;border-radius:50%}
.clean{text-align:center;padding:28px 20px;background:var(--card);border-radius:var(--r);border:1px solid var(--border)}
.ci{font-size:2.2em;margin-bottom:8px}
.ct{font-size:.95em;font-weight:700;color:var(--green)}
.cs{font-size:.8em;color:var(--text2);margin-top:4px}
</style>
</head>
<body>
<div class="header">
  <h1>🔬 Сканер <span>Е-добавок</span></h1>
  <div class="tabs">
    <button class="tab-btn active" onclick="sw('scan')">📷 Штрихкод</button>
    <button class="tab-btn" onclick="sw('manual')">✍️ Вручную</button>
  </div>
</div>

<div id="tab-scan" class="tab-content active">
  <div class="card">
    <div id="vcont">
      <video id="vid" autoplay playsinline muted></video>
      <div class="overlay"><div class="frame"><div class="line"></div></div></div>
      <div class="hint">Поместите штрихкод в рамку</div>
      <button class="stop-btn" onclick="stopCam()">✕ Стоп</button>
    </div>
    <div class="ctrl">
      <button id="cbtn" class="btn btn-red" onclick="startCam()">📷 Включить камеру</button>
      <div class="divider">или</div>
      <input type="text" id="bi" placeholder="Введите штрихкод (8–13 цифр)" inputmode="numeric" onkeydown="if(event.key==='Enter')goBarcode()">
      <button class="btn btn-out" onclick="goBarcode()">🔍 Найти продукт</button>
    </div>
  </div>
</div>

<div id="tab-manual" class="tab-content">
  <div class="card" style="padding:15px">
    <div class="lbl">Введите Е-добавки через запятую</div>
    <textarea id="mi" placeholder="Например: E102, E211, E621, E330"></textarea>
  </div>
  <button class="btn btn-red" onclick="goManual()">🔬 Расшифровать добавки</button>
</div>

<p id="status"></p>
<div id="result"></div>

var stream=null, raf=null, detector=null;

function sw(t){
  document.querySelectorAll('.tab-content').forEach(function(e){e.classList.remove('active')});
  document.querySelectorAll('.tab-btn').forEach(function(e){e.classList.remove('active')});
  document.getElementById('tab-'+t).classList.add('active');
  document.querySelectorAll('.tab-btn')[t==='scan'?0:1].classList.add('active');
  st('');
}
function st(m){document.getElementById('status').textContent=m}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function stopCam(){
  if(raf){cancelAnimationFrame(raf);raf=null}
  if(stream){stream.getTracks().forEach(function(t){t.stop()});stream=null}
  document.getElementById('vcont').classList.remove('on');
  var b=document.getElementById('cbtn');b.textContent='📷 Включить камеру';b.disabled=false;
}

function startCam(){
  document.getElementById('result').innerHTML='';
  var b=document.getElementById('cbtn');b.disabled=true;b.textContent='⏳ Загрузка...';
  st('Запрашиваю доступ к камере...');
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}})
    .then(function(s){
      stream=s;
      var v=document.getElementById('vid');
      v.srcObject=s;
      document.getElementById('vcont').classList.add('on');
      b.textContent='🔄 Перезапустить';b.disabled=false;
      v.onloadedmetadata=function(){
        v.play();
        st('Наведите камеру на штрихкод');
        if('BarcodeDetector' in window){
          detector=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code']});
          scanLoop(v);
        } else {
          st('Автосканер недоступен в вашем браузере. Введите штрихкод вручную ниже.');
          stopCam();
        }
      };
    })
    .catch(function(e){
      stopCam();
      if(e.name==='NotAllowedError') st('Нет доступа к камере — разрешите доступ в настройках браузера');
      else if(e.name==='NotFoundError') st('Камера не найдена');
      else st('Ошибка камеры: '+e.message);
    });
}

function scanLoop(v){
  if(!stream){return}
  detector.detect(v).then(function(r){
    if(r&&r.length>0){
      var code=r[0].rawValue;
      stopCam();
      st('Штрихкод: '+code+' — ищем...');
      fetchProduct(code);
    } else {
      raf=requestAnimationFrame(function(){scanLoop(v)});
    }
  }).catch(function(){
    raf=requestAnimationFrame(function(){scanLoop(v)});
  });
}

function goBarcode(){
  var code=document.getElementById('bi').value.trim().replace(/\D/g,'');
  if(code.length<8){st('Введите корректный штрихкод (8–13 цифр)');return}
  document.getElementById('result').innerHTML='';
  st('Ищем продукт...');
  fetchProduct(code);
}

function fetchProduct(barcode){
  var url='https://world.openfoodfacts.org/api/v0/product/'+barcode+'.json?fields=product_name,product_name_ru,brands,additives_tags,additives_original_tags';
  fetch(url)
    .then(function(r){return r.json()})
    .then(function(d){
      if(d.status===1){st('');renderProduct(d.product)}
      else{
        st('Продукт не найден в Open Food Facts');
        document.getElementById('result').innerHTML='<div style="text-align:center;padding:28px 0;color:var(--text2);font-size:.88em;">😔 Товар не найден в базе.<br><br>Перейдите на вкладку <b>✍️ Вручную</b><br>и введите Е-добавки с упаковки.</div>';
      }
    })
    .catch(function(){st('Ошибка соединения — проверьте интернет')});
}

function goManual(){
  var raw=document.getElementById('mi').value.trim().toUpperCase();
  if(!raw){st('Введите Е-добавки');return}
  var codes=raw.split(/[\s,;]+/).filter(Boolean).map(function(c){c=c.trim();return c[0]==='E'?c:'E'+c});
  st('');
  document.getElementById('result').innerHTML='';
  renderAdditives(null,null,codes);
}

function renderProduct(p){
  var name=p.product_name_ru||p.product_name||'Название не указано';
  var brand=p.brands||'';
  var tags=p.additives_tags||p.additives_original_tags||[];
  var codes=tags.map(function(t){return t.replace(/^[a-z]{2}:/i,'').toUpperCase()});
  renderAdditives(name,brand,codes);
}

function renderAdditives(name,brand,codes){
  var html='';
  if(name){
    html+='<div class="ph">';
    html+='<div class="pn">📦 '+esc(name)+'</div>';
    if(brand)html+='<div class="pm">'+esc(brand)+'</div>';
    var nd=codes.filter(function(c){return DB[c]&&DB[c][2]==='danger'}).length;
    var nw=codes.filter(function(c){return DB[c]&&DB[c][2]==='warning'}).length;
    var ns=codes.filter(function(c){return DB[c]&&DB[c][2]==='safe'}).length;
    html+='<div class="badges">';
    if(codes.length===0){html+='<span class="badge bc">✓ Без Е-добавок</span>'}
    else{
      html+='<span style="font-size:.8em;color:var(--text2)">Добавок: <b>'+codes.length+'</b></span>';
      if(nd)html+='<span class="badge bd">⚠ опасных: '+nd+'</span>';
      if(nw)html+='<span class="badge bw">! спорных: '+nw+'</span>';
      if(ns)html+='<span class="badge bc">✓ безопасных: '+ns+'</span>';
    }
    html+='</div></div>';
  }
  if(codes.length===0){
    html+='<div class="clean"><div class="ci">🌿</div><div class="ct">Продукт чистый!</div><div class="cs">Е-добавки не обнаружены</div></div>';
    document.getElementById('result').innerHTML=html;return;
  }
  var danger=[],warn=[],safe=[],unknown=[];
  codes.forEach(function(c){
    var i=DB[c];
    if(!i)unknown.push(c);
    else if(i[2]==='danger')danger.push(c);
    else if(i[2]==='warning')warn.push(c);
    else safe.push(c);
  });
  html+='<div class="legend"><span class="li"><span class="ld" style="background:var(--red)"></span>Опасно</span><span class="li"><span class="ld" style="background:var(--yellow)"></span>Спорно</span><span class="li"><span class="ld" style="background:var(--green)"></span>Безопасно</span><span class="li"><span class="ld" style="background:var(--text3)"></span>Нет данных</span></div>';
  function rg(list,cls,icon){
    return list.map(function(c){
      var i=DB[c];
      return '<div class="ai '+cls+'"><span class="si">'+icon+'</span>'
        +'<div class="ac">'+c+(i?' — <span class="an">'+esc(i[0])+'</span>':'')+'</div>'
        +(i?'<div class="ad">'+esc(i[1])+'</div>':'<div class="ad" style="color:var(--text3)">Нет данных в базе</div>')
        +'</div>';
    }).join('');
  }
  if(danger.length)html+='<div class="sec">⚠️ Опасные</div>'+rg(danger,'danger','🔴');
  if(warn.length)html+='<div class="sec">⚡ Спорные</div>'+rg(warn,'warning','🟡');
  if(safe.length)html+='<div class="sec">✅ Безопасные</div>'+rg(safe,'safe','🟢');
  if(unknown.length)html+='<div class="sec">❓ Нет данных</div>'+rg(unknown,'unknown','⚪');
  document.getElementById('result').innerHTML=html;
}
</script>
