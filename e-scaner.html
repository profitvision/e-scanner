<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер Е-добавок</title>
    <link rel="manifest" href="e-manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }

        h1 {
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        #video {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            border: 3px solid #e94560;
            margin: 10px auto;
            display: block;
        }

        button {
            padding: 12px 25px;
            font-size: 1em;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
        }

        button:active {
            background: #c73652;
        }

        #result {
            margin: 10px;
            font-size: 1.1em;
            text-align: left;
            max-width: 400px;
            margin: 10px auto;
        }

        .additive {
            padding: 8px;
            margin: 5px 0;
            border-radius: 8px;
            background: #16213e;
        }

        .safe {
            border-left: 5px solid #4CAF50;
        }

        .warning {
            border-left: 5px solid #FF9800;
        }

        .danger {
            border-left: 5px solid #e94560;
        }

        #loading {
            color: #aaa;
            font-size: 0.9em;
        }
    </style>
</head>

    <button onclick="stopScan()">⏹ Стоп</button>

        function startScan() {
            document.getElementById("loading").textContent = "Запуск камеры...";
            document.getElementById("result").innerHTML = "";

            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector("#video"),
                    constraints: { facingMode: "environment" }
                },
                decoder: { readers: ["ean_reader", "ean_8_reader"] }
            }, function (err) {
                if (err) {
                    document.getElementById("loading").textContent = "Ошибка камеры. Разрешите доступ.";
                    return;
                }
                document.getElementById("loading").textContent = "Наведите камеру на штрихкод...";
                Quagga.start();
            });

            Quagga.onDetected(function (result) {
                var code = result.codeResult.code;
                document.getElementById("loading").textContent = "Штрихкод: " + code;
                Quagga.stop();
                fetchProductInfo(code);
            });
        }

        function stopScan() {
            Quagga.stop();
            document.getElementById("loading").textContent = "Остановлено";
        }

        function fetchProductInfo(barcode) {
            document.getElementById("loading").textContent = "Ищем продукт в базе...";

            fetch("https://world.openfoodfacts.org/api/v0/product/" + barcode + ".json")
                .then(function (response) { return response.json(); })
                .then(function (data) {
                    if (data.status === 1) {
                        showAdditives(data.product);
                    } else {
                        document.getElementById("loading").textContent = "Продукт не найден в базе. Попробуйте другой.";
                        document.getElementById("result").innerHTML = "<p>База данных пополняется каждый день. Этого товара пока нет.</p>";
                    }
                })
                .catch(function () {
                    document.getElementById("loading").textContent = "Ошибка соединения. Проверьте интернет.";
                });
        }

        function showAdditives(product) {
            var name = product.product_name || "Название не указано";
            var additives = product.additives_tags || [];

            var html = "<h3>📦 " + name + "</h3>";

            if (additives.length === 0) {
                html += "<p>✅ Е-добавки не найдены!</p>";
            } else {
                html += "<p>Найдено Е-добавок: <b>" + additives.length + "</b></p>";

                for (var i = 0; i < additives.length; i++) {
                    var code = additives[i].replace("en:", "").toUpperCase();
                    var info = e_db[code];

                    if (info) {
                        var cssClass = info[2]; // safe, warning, danger
                        html += '<div class="additive ' + cssClass + '">';
                        html += '<b>' + code + '</b> — ' + info[0] + '<br>';
                        html += '<small>' + info[1] + '</small>';
                        html += '</div>';
                    } else {
                        html += '<div class="additive">';
                        html += '<b>' + code + '</b> — Информация уточняется';
                        html += '</div>';
                    }
                }
            }

            document.getElementById("result").innerHTML = html;
            document.getElementById("loading").textContent = "Готово!";
        }
    </script>

</html>
